name: xiaozhangben
description: 小账本 - 个人记账App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # UI 图标
  cupertino_icons: ^1.0.6
  # 图表库 - 用于统计页面的饼图和柱状图
  fl_chart: ^0.68.0
  # 日期格式化
  intl: ^0.19.0
  # Excel 文件生成（导出数据用）
  excel: ^4.0.6
  # 文件分享（导出后发送到微信/邮箱等）
  share_plus: ^10.1.4
  # 获取设备存储路径
  path_provider: ^2.1.5
  # 本地 SQLite 数据库
  sqflite: ^2.4.1
  path: ^1.9.0
  # 文件选择器（导入数据用）
  file_picker: ^8.1.6
  # CSV 编码解码
  csv: ^6.0.0
  # 图片选择器（自定义背景）
  image_picker: ^1.1.2
  # 图片裁剪器（待兼容版本修复后启用）
  # image_cropper: ^8.1.0
  # 持久化存储用户偏好
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
